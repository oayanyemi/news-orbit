openapi: 3.0.3
info:
  title: News Orbit Backend API
  version: 1.0.0
  description: API for aggregated news retrieval, user preferences, and NYT-compatible top stories.
servers:
  - url: http://localhost:8000
paths:
  /api/articles:
    get:
      summary: List aggregated articles
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: sources[]
          schema:
            type: array
            items: { type: string }
        - in: query
          name: categories[]
          schema:
            type: array
            items: { type: string }
        - in: query
          name: authors[]
          schema:
            type: array
            items: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: client_id
          schema: { type: string }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: Paginated article collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticlePagination'
  /api/articles/filters:
    get:
      summary: List available filter values for articles
      responses:
        '200':
          description: Distinct filter options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleFilters'
  /api/preferences/{clientId}:
    get:
      summary: Get a client preference profile
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Preference profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreference'
    put:
      summary: Create or update a client preference profile
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sources:
                  type: array
                  items: { type: string }
                categories:
                  type: array
                  items: { type: string }
                authors:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Updated preference profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreference'
  /api/top-stories/{section}.json:
    get:
      summary: NYT Top Stories compatible endpoint
      parameters:
        - in: path
          name: section
          required: true
          schema:
            type: string
            enum: [arts, automobiles, books/review, business, fashion, food, health, home, insider, magazine, movies, nyregion, obituaries, opinion, politics, realestate, science, sports, sundayreview, technology, theater, t-magazine, travel, upshot, us, world]
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Top stories response envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopStoriesResponse'
components:
  schemas:
    Article:
      type: object
      properties:
        id: { type: integer }
        source: { type: string }
        external_id: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        content: { type: string, nullable: true }
        url: { type: string }
        image_url: { type: string, nullable: true }
        author: { type: string, nullable: true }
        category: { type: string, nullable: true }
        published_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ArticlePagination:
      type: object
      properties:
        current_page: { type: integer }
        data:
          type: array
          items:
            $ref: '#/components/schemas/Article'
        first_page_url: { type: string, nullable: true }
        from: { type: integer, nullable: true }
        last_page: { type: integer }
        last_page_url: { type: string, nullable: true }
        links:
          type: array
          items:
            type: object
            properties:
              url: { type: string, nullable: true }
              label: { type: string }
              active: { type: boolean }
        next_page_url: { type: string, nullable: true }
        path: { type: string }
        per_page: { type: integer }
        prev_page_url: { type: string, nullable: true }
        to: { type: integer, nullable: true }
        total: { type: integer }
    ArticleFilters:
      type: object
      properties:
        sources:
          type: array
          items: { type: string }
        categories:
          type: array
          items: { type: string }
        authors:
          type: array
          items: { type: string }
    UserPreference:
      type: object
      properties:
        id: { type: integer }
        client_id: { type: string }
        sources:
          type: array
          items: { type: string }
        categories:
          type: array
          items: { type: string }
        authors:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    TopStoryArticle:
      type: object
      properties:
        section: { type: string }
        subsection: { type: string }
        title: { type: string }
        abstract: { type: string }
        url: { type: string }
        uri: { type: string }
        byline: { type: string }
        item_type: { type: string }
        updated_date: { type: string, format: date-time, nullable: true }
        created_date: { type: string, format: date-time, nullable: true }
        published_date: { type: string, format: date-time, nullable: true }
        material_type_facet: { type: string }
        kicker: { type: string }
        des_facet:
          type: array
          items: { type: string }
        org_facet:
          type: array
          items: { type: string }
        per_facet:
          type: array
          items: { type: string }
        geo_facet:
          type: array
          items: { type: string }
        multimedia:
          type: array
          items:
            type: object
            properties:
              url: { type: string }
              format: { type: string }
              height: { type: integer }
              width: { type: integer }
              type: { type: string }
              subtype: { type: string }
              caption: { type: string }
              copyright: { type: string }
        short_url: { type: string }
    TopStoriesResponse:
      type: object
      properties:
        status: { type: string }
        copyright: { type: string }
        section: { type: string }
        last_updated: { type: string, format: date-time }
        num_results: { type: integer }
        results:
          type: array
          items:
            $ref: '#/components/schemas/TopStoryArticle'
